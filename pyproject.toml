[project]
name = "gohome"
version = "0.1.0"
description = "A self-hosted link directory and redirector service"
requires-python = ">=3.14"
dependencies = [
    "flask>=3.1",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "mypy>=1.15",
    "ruff>=0.11",
    "types-PyYAML>=6.0",
    "types-Flask>=1.1",
]
screenshots = [
    "playwright>=1.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gohome"]

[tool.mypy]
strict = true
packages = ["gohome"]
mypy_path = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
src = ["src"]
